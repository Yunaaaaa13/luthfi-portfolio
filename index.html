

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhammad Luthfi Rafif — Portfolio</title>
<meta name="description" content="Portfolio of Muhammad Luthfi Rafif — Information Systems student specializing in Project Management, Data Analytics, and IT Governance at Telkom University Jakarta.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --navy:#0B1426;
    --navy2:#111c35;
    --teal:#00C2A8;
    --teal2:#00997f;
    --gold:#F5C842;
    --white:#F8F9FC;
    --gray:#8895AA;
    --light:#1A2540;
    --card:#141e34;
    --border:rgba(0,194,168,0.18);
  }
  html{scroll-behavior:smooth}
  body{
    background:var(--navy);
    color:var(--white);
    font-family:'DM Sans',sans-serif;
    font-size:16px;
    line-height:1.7;
    overflow-x:hidden;
  }

  /* SCROLL PROGRESS BAR */
  .scroll-progress{
    position:fixed;top:0;left:0;
    height:3px;width:0%;
    background:linear-gradient(90deg,var(--teal),var(--gold));
    z-index:999;
    transition:width .1s linear;
    border-radius:0 2px 2px 0;
  }

  /* NAV */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:1.2rem 4rem;
    background:rgba(11,20,38,0.85);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    transition:padding .3s ease, background .3s ease;
  }
  nav.scrolled{
    padding:0.8rem 4rem;
    background:rgba(11,20,38,0.95);
    box-shadow:0 4px 30px rgba(0,0,0,0.3);
  }
  .nav-logo{
    font-family:'Syne',sans-serif;
    font-weight:800;font-size:1.1rem;
    color:var(--teal);letter-spacing:0.04em;
    position:relative;
  }
  .nav-logo::after{
    content:'';
    position:absolute;bottom:-4px;left:0;
    width:100%;height:2px;
    background:linear-gradient(90deg,var(--teal),transparent);
    border-radius:2px;
  }
  .nav-links{display:flex;gap:2rem;list-style:none}
  .nav-links a{
    color:var(--gray);font-size:0.9rem;text-decoration:none;
    transition:color .2s;font-weight:400;letter-spacing:0.03em;
    position:relative;
  }
  .nav-links a::after{
    content:'';position:absolute;bottom:-4px;left:0;
    width:0;height:2px;
    background:var(--teal);border-radius:2px;
    transition:width .3s ease;
  }
  .nav-links a:hover{color:var(--teal)}
  .nav-links a:hover::after{width:100%}

  /* HAMBURGER */
  .nav-toggle{
    display:none;
    background:transparent;
    border:1px solid rgba(255,255,255,0.18);
    border-radius:10px;
    padding:0.55rem 0.7rem;
    color:var(--white);
    cursor:pointer;
    font-size:1rem;
    flex-direction:column;
    gap:5px;
    align-items:center;
    justify-content:center;
    width:44px;height:44px;
    transition:border-color .2s;
  }
  .nav-toggle:hover{border-color:var(--teal)}
  .nav-toggle:focus{outline:2px solid rgba(0,194,168,0.35);outline-offset:2px}
  .nav-toggle span{
    display:block;width:20px;height:2px;
    background:var(--white);border-radius:2px;
    transition:transform .3s ease,opacity .2s ease;
  }
  .nav-toggle.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
  .nav-toggle.active span:nth-child(2){opacity:0}
  .nav-toggle.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

  /* MOBILE NAV DROPDOWN */
  .nav-links-mobile{
    display:none;
    position:fixed;
    top:70px;
    left:12px;
    right:12px;
    z-index:101;
    background:rgba(11,20,38,0.97);
    border:1px solid var(--border);
    border-radius:16px;
    padding:0.8rem 0.7rem;
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    transform:translateY(-10px);
    opacity:0;
    transition:transform .3s ease, opacity .3s ease;
    pointer-events:none;
  }
  .nav-links-mobile.show{
    display:block;
    transform:translateY(0);
    opacity:1;
    pointer-events:all;
    animation:slideDown .3s ease forwards;
  }
  @keyframes slideDown{
    from{transform:translateY(-10px);opacity:0}
    to{transform:translateY(0);opacity:1}
  }
  .nav-links-mobile ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:0.3rem}
  .nav-links-mobile a{
    display:flex;align-items:center;gap:10px;
    padding:0.85rem 1rem;
    border-radius:12px;
    color:var(--gray);
    text-decoration:none;
    font-size:0.95rem;
    transition:all .2s;
  }
  .nav-links-mobile a:hover,
  .nav-links-mobile a:active{background:rgba(0,194,168,0.1);color:var(--teal)}
  .nav-links-mobile .nav-emoji{font-size:1.1rem;width:28px;text-align:center}

  /* HERO */
  .hero{
    min-height:100vh;
    display:flex;align-items:center;
    padding:7rem 4rem 4rem;
    position:relative;overflow:hidden;
  }
  .hero::before{
    content:'';position:absolute;
    top:-200px;right:-200px;
    width:600px;height:600px;
    background:radial-gradient(circle, rgba(0,194,168,0.12) 0%, transparent 70%);
    pointer-events:none;
  }
  .hero::after{
    content:'';position:absolute;
    bottom:-100px;left:-100px;
    width:400px;height:400px;
    background:radial-gradient(circle, rgba(245,200,66,0.07) 0%, transparent 70%);
    pointer-events:none;
  }
  .hero-inner{
    display:grid;grid-template-columns:1fr auto;
    gap:4rem;align-items:center;
    max-width:1100px;margin:0 auto;width:100%;
  }
  .hero-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(0,194,168,0.1);
    border:1px solid rgba(0,194,168,0.3);
    border-radius:100px;
    padding:0.35rem 1rem;
    font-size:0.82rem;color:var(--teal);
    letter-spacing:0.05em;text-transform:uppercase;
    font-weight:500;margin-bottom:1.5rem;
  }
  .hero-badge::before{content:'●';font-size:0.5rem;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .hero h1{
    font-family:'Syne',sans-serif;
    font-size:clamp(2.4rem,5vw,4rem);
    font-weight:800;line-height:1.1;
    margin-bottom:0.5rem;
  }
  .hero h1 span{color:var(--teal)}
  .typing-cursor{
    display:inline-block;
    width:3px;
    height:0.9em;
    background:var(--teal);
    margin-left:4px;
    animation:blink 1s step-end infinite;
    vertical-align:baseline;
    border-radius:2px;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .hero-subtitle{
    font-size:1.15rem;color:var(--gray);
    font-weight:300;margin-bottom:1.8rem;
    max-width:520px;line-height:1.6;
  }
  .hero-tags{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:2.5rem}
  .tag{
    background:var(--light);
    border:1px solid var(--border);
    border-radius:6px;padding:0.3rem 0.85rem;
    font-size:0.82rem;color:var(--teal);
    font-weight:500;
    transition:transform .2s,background .2s;
  }
  .tag:hover{transform:translateY(-2px);background:rgba(0,194,168,0.08)}
  .hero-cta{display:flex;gap:1rem;flex-wrap:wrap}
  .btn-primary{
    background:linear-gradient(135deg,var(--teal),#00e6c8);color:var(--navy);
    padding:0.75rem 2rem;border-radius:8px;
    font-weight:700;font-size:0.95rem;
    text-decoration:none;border:none;cursor:pointer;
    font-family:'DM Sans',sans-serif;
    transition:all .2s ease;
    display:inline-block;
    box-shadow:0 4px 20px rgba(0,194,168,0.25);
    position:relative;overflow:hidden;
  }
  .btn-primary::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,transparent,rgba(255,255,255,0.15));
    opacity:0;transition:opacity .2s;
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(0,194,168,0.35)}
  .btn-primary:hover::before{opacity:1}
  .btn-primary:active{transform:translateY(0)}
  .btn-outline{
    background:transparent;color:var(--white);
    padding:0.75rem 2rem;border-radius:8px;
    font-weight:500;font-size:0.95rem;
    text-decoration:none;border:1px solid rgba(255,255,255,0.2);cursor:pointer;
    font-family:'DM Sans',sans-serif;
    transition:all .2s ease;
    display:inline-block;
  }
  .btn-outline:hover{border-color:var(--teal);color:var(--teal);transform:translateY(-2px)}
  .btn-outline:active{transform:translateY(0)}

  .hero-photo{
    width:260px;height:320px;
    border-radius:20px;
    object-fit:cover;object-position:top center;
    border:2px solid var(--border);
    filter:grayscale(10%);
    position:relative;z-index:1;
    flex-shrink:0;
    transition:transform .4s ease,filter .4s ease;
  }
  .hero-photo:hover{transform:scale(1.03);filter:grayscale(0%)}
  .hero-photo-wrap{
    position:relative;
    flex-shrink:0;
  }
  .hero-photo-wrap::before{
    content:'';
    position:absolute;
    inset:-8px;
    border-radius:24px;
    border:1px solid rgba(0,194,168,0.2);
    z-index:0;
    transition:border-color .3s;
  }
  .hero-photo-wrap:hover::before{border-color:rgba(0,194,168,0.5)}
  .hero-photo-wrap::after{
    content:'';
    position:absolute;
    bottom:-16px;right:-16px;
    width:80px;height:80px;
    background:var(--gold);
    border-radius:12px;
    opacity:0.15;
    z-index:0;
    animation:floatAccent 4s ease-in-out infinite;
  }
  @keyframes floatAccent{
    0%,100%{transform:translate(0,0)}
    50%{transform:translate(-6px,-6px)}
  }

  /* SECTION COMMON */
  section{padding:5rem 4rem;max-width:1100px;margin:0 auto}
  .section-label{
    font-size:0.78rem;color:var(--teal);letter-spacing:0.12em;
    text-transform:uppercase;font-weight:600;
    margin-bottom:0.6rem;
  }
  .section-title{
    font-family:'Syne',sans-serif;
    font-size:clamp(1.6rem,3vw,2.4rem);
    font-weight:700;margin-bottom:2.5rem;
    line-height:1.2;
  }
  .section-divider{
    width:100%;
    border:none;border-top:1px solid var(--border);
    margin:0;
  }

  /* STATS */
  .stats-strip{
    display:grid;grid-template-columns:repeat(4,1fr);
    gap:1px;
    background:var(--border);
    border:1px solid var(--border);
    border-radius:16px;overflow:hidden;
    margin:0 4rem 0;
    max-width:1100px;
    margin-left:auto;margin-right:auto;
    width:calc(100% - 8rem);
  }
  .stat{
    background:var(--card);
    padding:1.8rem 2rem;
    text-align:center;
    transition:background .3s;
  }
  .stat:hover{background:rgba(0,194,168,0.04)}
  .stat-num{
    font-family:'Syne',sans-serif;
    font-size:2rem;font-weight:800;
    color:var(--teal);
  }
  .stat-label{
    font-size:0.82rem;color:var(--gray);
    margin-top:4px;
  }

  /* SKILLS */
  .skills-grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:1.2rem;
  }
  .skill-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:1.4rem 1.6rem;
    transition:all .3s ease;
    position:relative;overflow:hidden;
  }
  .skill-card::before{
    content:'';position:absolute;
    top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--teal),transparent);
    opacity:0;transition:opacity .3s;
  }
  .skill-card:hover{border-color:var(--teal);transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,194,168,0.08)}
  .skill-card:hover::before{opacity:1}
  .skill-icon{
    font-size:1.6rem;margin-bottom:0.8rem;
  }
  .skill-name{
    font-family:'Syne',sans-serif;
    font-weight:700;font-size:1rem;
    margin-bottom:0.4rem;
  }
  .skill-desc{
    font-size:0.84rem;color:var(--gray);line-height:1.5;
  }
  /* ANIMATED SKILL BAR */
  .skill-bar-wrap{
    margin-top:1rem;
    height:6px;
    background:var(--light);
    border-radius:10px;
    overflow:hidden;
    position:relative;
  }
  .skill-bar{
    height:100%;
    border-radius:10px;
    background:linear-gradient(90deg,var(--teal),#00e6c8);
    width:0%;
    transition:width 1.2s cubic-bezier(.4,0,.2,1);
    position:relative;
  }
  .skill-bar::after{
    content:'';position:absolute;
    top:0;right:0;bottom:0;left:0;
    background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.25) 50%,transparent 100%);
    animation:shimmer 2.5s infinite;
  }
  @keyframes shimmer{
    0%{transform:translateX(-100%)}
    100%{transform:translateX(100%)}
  }

  /* EXPERIENCE TIMELINE */
  .timeline{position:relative;padding-left:2rem}
  .timeline::before{
    content:'';position:absolute;
    left:0;top:0;bottom:0;
    width:2px;
    background:linear-gradient(180deg,var(--teal),var(--border),transparent);
  }
  .titem{
    position:relative;
    margin-bottom:2.5rem;
    padding-left:1.5rem;
    transition:transform .2s;
  }
  .titem:hover{transform:translateX(4px)}
  .titem::before{
    content:'';
    position:absolute;left:-2rem;top:0.35rem;
    width:12px;height:12px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 0 4px rgba(0,194,168,0.15);
    transition:box-shadow .3s;
  }
  .titem:hover::before{box-shadow:0 0 0 8px rgba(0,194,168,0.12)}
  .titem.ongoing::before{
    animation:tpulse 2s infinite;
  }
  @keyframes tpulse{
    0%,100%{box-shadow:0 0 0 4px rgba(0,194,168,0.15)}
    50%{box-shadow:0 0 0 10px rgba(0,194,168,0.05)}
  }
  .t-period{
    font-size:0.78rem;color:var(--gray);
    text-transform:uppercase;letter-spacing:0.08em;
    margin-bottom:0.3rem;
  }
  .t-role{
    font-family:'Syne',sans-serif;
    font-weight:700;font-size:1.1rem;
    margin-bottom:0.1rem;
  }
  .t-org{
    font-size:0.9rem;color:var(--teal);
    margin-bottom:0.7rem;
  }
  .t-bullets{
    list-style:none;
    padding:0;
  }
  .t-bullets li{
    font-size:0.88rem;color:var(--gray);
    padding-left:1rem;position:relative;
    margin-bottom:4px;line-height:1.5;
  }
  .t-bullets li::before{
    content:'→';
    position:absolute;left:0;
    color:var(--teal);font-size:0.75rem;
    top:2px;
  }
  .badge-ongoing{
    display:inline-block;
    background:rgba(245,200,66,0.12);
    border:1px solid rgba(245,200,66,0.3);
    color:var(--gold);
    font-size:0.7rem;padding:2px 10px;border-radius:100px;
    font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
    margin-left:8px;vertical-align:middle;
  }

  /* PROJECTS */
  .projects-grid{
    display:grid;grid-template-columns:repeat(2,1fr);
    gap:1.4rem;
  }
  .project-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:1.8rem;
    position:relative;overflow:hidden;
    transition:all .3s ease;
  }
  .project-card::before{
    content:'';position:absolute;
    inset:0;
    background:radial-gradient(600px circle at var(--mouse-x,50%) var(--mouse-y,50%),rgba(0,194,168,0.06),transparent 60%);
    pointer-events:none;
    opacity:0;transition:opacity .3s;
  }
  .project-card:hover::before{opacity:1}
  .project-card:hover{border-color:var(--teal);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,194,168,0.08)}
  .project-card.ongoing{
    border-color:rgba(245,200,66,0.25);
  }
  .project-card.ongoing::before{
    background:radial-gradient(600px circle at var(--mouse-x,50%) var(--mouse-y,50%),rgba(245,200,66,0.05),transparent 60%);
  }
  .project-card.ongoing:hover{border-color:var(--gold);box-shadow:0 12px 40px rgba(245,200,66,0.06)}
  .project-status{
    display:inline-block;
    font-size:0.72rem;font-weight:600;
    text-transform:uppercase;letter-spacing:0.08em;
    padding:3px 12px;border-radius:100px;
    margin-bottom:1rem;
  }
  .ps-done{background:rgba(0,194,168,0.12);color:var(--teal);border:1px solid rgba(0,194,168,0.25)}
  .ps-ongoing{background:rgba(245,200,66,0.1);color:var(--gold);border:1px solid rgba(245,200,66,0.25)}
  .project-name{
    font-family:'Syne',sans-serif;
    font-weight:700;font-size:1.2rem;margin-bottom:0.6rem;
  }
  .project-desc{font-size:0.88rem;color:var(--gray);line-height:1.6;margin-bottom:1rem}
  .project-stack{display:flex;gap:6px;flex-wrap:wrap}
  .pstack{
    background:var(--light);border:1px solid var(--border);
    border-radius:5px;padding:3px 10px;
    font-size:0.76rem;color:var(--teal);
    font-weight:500;
    transition:all .2s;
  }
  .pstack:hover{background:rgba(0,194,168,0.08);border-color:var(--teal)}
  .project-accent{
    position:absolute;top:0;right:0;
    width:80px;height:80px;
    background:radial-gradient(circle at top right, rgba(0,194,168,0.08), transparent 70%);
    pointer-events:none;
  }
  .project-card.ongoing .project-accent{
    background:radial-gradient(circle at top right, rgba(245,200,66,0.07), transparent 70%);
  }

  /* CERTIFICATIONS */
  .certs-grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:1.2rem;
  }
  .cert-car
